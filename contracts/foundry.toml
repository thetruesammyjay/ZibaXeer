[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
hyperpaxeer = "https://mainnet-beta.rpc.hyperpaxeer.com/rpc"

# PaxScan verification — get your API key from https://paxscan.paxeer.app/register
[etherscan]
hyperpaxeer = { key = "${PAXSCAN_API_KEY}", url = "https://api.paxscan.paxeer.app/api" }
